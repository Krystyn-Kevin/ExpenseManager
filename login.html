<!DOCTYPE html>
<html>
<head>
  <title>Login - Expense Manager</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body>
  <h2>Login</h2>
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>

  <button onclick="login()">Login</button>
  <button onclick="goToSignup()">Sign Up</button>
  
  <hr> <button onclick="googleLogin()" style="background-color: #4285F4; color: white;">Sign in with Google</button>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCPlB-HjpQPfBQbkvH8gApsyBY-ju5l2G4",
    authDomain: "expense-manager-d42e0.firebaseapp.com",
    projectId: "expense-manager-d42e0",
    storageBucket: "expense-manager-d42e0.appspot.com",
    messagingSenderId: "777494191910",
    appId: "1:777494191910:web:4860b0e50889ec703901b0"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ADD THIS FOR GOOGLE PROVIDER
const provider = new firebase.auth.GoogleAuthProvider();

// NEW GOOGLE LOGIN FUNCTION
function googleLogin() {
    auth.signInWithPopup(provider)
        .then((result) => {
            // Success! Redirect to index.html
            window.location.replace("index.html");
        })
        .catch((err) => {
            alert("Google Login Failed: " + err.message);
        });
}

function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
        alert("Please enter both email and password.");
        return;
    }

    auth.setPersistence(firebase.auth.Auth.Persistence.SESSION)
        .then(() => {
            return auth.signInWithEmailAndPassword(email, password);
        })
        .then(() => {
            window.location.replace("index.html");
        })
        .catch(err => alert("Login Failed: " + err.message));
}

function goToSignup() {
    window.location.href = "signup.html";
}
</script>
</body>
</html>
