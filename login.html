<!DOCTYPE html>
<html>
<head>
  <title>Login - Spendex</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body>
  <h2>Login</h2>
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>

<script>
 // 1. Firebase Config (Keep this identical to your other files)
const firebaseConfig = {
    apiKey: "AIzaSyCPlB-HjpQPfBQbkvH8gApsyBY-ju5l2G4",
    authDomain: "expense-manager-d42e0.firebaseapp.com",
    projectId: "expense-manager-d42e0",
    storageBucket: "expense-manager-d42e0.appspot.com",
    messagingSenderId: "777494191910",
    appId: "1:777494191910:web:4860b0e50889ec703901b0"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// 2. The Login Function
function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
        alert("Please enter both email and password.");
        return;
    }

    // Set persistence to SESSION (logs out when tab/browser closes)
    auth.setPersistence(firebase.auth.Auth.Persistence.SESSION)
        .then(() => {
            return auth.signInWithEmailAndPassword(email, password);
        })
        .then(() => {
            window.location.replace("index.html");
        })
        .catch(err => alert("Login Failed: " + err.message));
}

// 3. The Redirection Function (This fixes your "Sign Up" click issue)
function goToSignup() {
    window.location.href = "signup.html";
}
</script>
</body>
</html>
