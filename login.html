<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Expense Manager</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>

<!-- Login page CSS & JS -->
<link rel="stylesheet" href="css/login-style.css">
</head>
<body>

<button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">
  <span class="theme-icon moon">🌙</span>
  <span class="theme-icon sun">☀️</span>
</button>

<div class="login-card">
  <div class="logo-wrap">
    <div class="logo">Expense<span>Manager</span></div>
    <div class="logo-sub">Personal Finance Tracker</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-login"  onclick="switchMode('login')">Sign In</button>
    <button class="tab"        id="tab-signup" onclick="switchMode('signup')">Sign Up</button>
  </div>

  <div class="form-title" id="form-title">Welcome back</div>

  <!-- Messages -->
  <div class="msg" id="error-msg"></div>
  <div class="msg" id="success-msg"></div>

  <!-- Form -->
  <form onsubmit="handleSubmit(event)" novalidate>
    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <input type="email" id="inp-email" placeholder="you@example.com" autocomplete="email">
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="inp-password" placeholder="Enter your password" autocomplete="current-password">
        <button type="button" class="eye-btn" onclick="togglePwd('inp-password', this)">👁</button>
      </div>
    </div>

    <!-- Confirm password — sign up only -->
    <div class="form-group" id="confirm-group" style="display:none">
      <label>Confirm Password</label>
      <div class="input-wrap">
        <input type="password" id="inp-confirm" placeholder="Re-enter your password" autocomplete="new-password">
        <button type="button" class="eye-btn" onclick="togglePwd('inp-confirm', this)">👁</button>
      </div>
    </div>

    <a class="forgot-link" id="forgot-link" onclick="handleForgot()">Forgot password?</a>

    <button type="submit" class="submit-btn" id="submit-btn">
      <span id="btn-text">Sign In</span>
      <span class="spinner" id="btn-spin"></span>
    </button>
  </form>

  <div class="divider">or continue with</div>

  <!-- Google Sign-In -->
  <button class="google-btn" id="google-btn" onclick="handleGoogle()">
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Continue with Google
  </button>

  <div class="footer-note" id="footer-note">
    Don't have an account? <a onclick="switchMode('signup')">Sign Up</a>
  </div>
</div>

<script src="js/login-script.js"></script>
</body>
</html>
