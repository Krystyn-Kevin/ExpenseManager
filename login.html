<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Expense Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
<style>
/* ── THEME TOKENS ────────────────────────────────────────────── */
[data-theme="dark"] {
  --bg:       #0c0c0f;
  --surface:  #141418;
  --surface2: #1c1c22;
  --border:   #2a2a35;
  --text:     #e8e8f0;
  --muted:    #6a6a80;
  --accent:   #c8f55a;
  --danger:   #f55a8c;
  --success:  #5af5c8;
  --grid-ln:  rgba(200,245,90,0.03);
  --shadow:   rgba(0,0,0,0.5);
}
[data-theme="light"] {
  --bg:       #f4f4f0;
  --surface:  #ffffff;
  --surface2: #f0f0ec;
  --border:   #dcdcd4;
  --text:     #18181c;
  --muted:    #888890;
  --accent:   #7ab800;
  --danger:   #e0284a;
  --success:  #00a07a;
  --grid-ln:  rgba(0,0,0,0.04);
  --shadow:   rgba(0,0,0,0.08);
}

/* ── RESET ───────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  transition: background 0.3s, color 0.3s;
  position: relative;
  overflow: hidden;
}

/* Grid background */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--grid-ln) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-ln) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}

/* Glow blob */
body::after {
  content: '';
  position: fixed;
  width: 500px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, rgba(120,184,0,0.07) 0%, transparent 70%);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  pointer-events: none; z-index: 0;
}

/* ── THEME TOGGLE ────────────────────────────────────────────── */
.theme-btn {
  position: fixed; top: 20px; right: 20px; z-index: 10;
  width: 44px; height: 26px; border-radius: 13px;
  border: 1px solid var(--border); background: var(--surface2);
  cursor: pointer; transition: background 0.25s;
}
.theme-btn::after {
  content: ''; position: absolute; top: 3px; left: 3px;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--muted);
  transition: left 0.25s, background 0.25s;
}
[data-theme="light"] .theme-btn::after { left: 21px; background: var(--accent); }
.theme-icon { font-size: 12px; position: absolute; top: 50%; transform: translateY(-50%); }
.theme-icon.moon { left: 5px; }
.theme-icon.sun  { right: 4px; }

/* ── CARD ────────────────────────────────────────────────────── */
.login-card {
  position: relative; z-index: 1;
  width: 100%; max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 36px 32px 32px;
  box-shadow: 0 8px 40px var(--shadow);
  animation: slideUp 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(28px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── LOGO ────────────────────────────────────────────────────── */
.logo-wrap { text-align: center; margin-bottom: 28px; }
.logo {
  font-family: 'Sora', sans-serif;
  font-size: 30px; font-weight: 800; letter-spacing: -1px;
  color: var(--text);
}
.logo span { color: var(--accent); }
.logo-sub {
  font-size: 12px; color: var(--muted); margin-top: 5px;
  letter-spacing: 1.5px; text-transform: uppercase;
}

/* ── TABS ────────────────────────────────────────────────────── */
.tabs {
  display: flex; gap: 0;
  background: var(--surface2); border-radius: 10px; padding: 3px;
  margin-bottom: 24px;
}
.tab {
  flex: 1; padding: 9px; border-radius: 8px; border: none;
  background: transparent; color: var(--muted);
  font-family: 'Inter', sans-serif; font-size: 13px;
  cursor: pointer; transition: all 0.2s; text-align: center;
}
.tab.active { background: var(--accent); color: var(--bg); font-weight: 600; }
.tab:not(.active):hover { color: var(--text); }

/* ── FORM TITLE ──────────────────────────────────────────────── */
.form-title {
  font-family: 'Sora', sans-serif;
  font-size: 19px; font-weight: 800; color: var(--text); margin-bottom: 20px;
}

/* ── INPUTS ──────────────────────────────────────────────────── */
.form-group { margin-bottom: 14px; }
.form-group label {
  font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
  color: var(--muted); display: block; margin-bottom: 6px;
}
.input-wrap { position: relative; }
.input-wrap input {
  width: 100%;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 15px;
  padding: 12px 42px 12px 14px; outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.input-wrap input:focus { border-color: var(--accent); }
.input-wrap input::placeholder { color: var(--muted); }

.eye-btn {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  font-size: 16px; color: var(--muted); padding: 0; line-height: 1;
  transition: color 0.15s;
}
.eye-btn:hover { color: var(--text); }

/* ── FORGOT ──────────────────────────────────────────────────── */
.forgot-link {
  font-size: 12px; color: var(--muted);
  text-align: right; display: block;
  margin-top: -8px; margin-bottom: 14px;
  cursor: pointer; transition: color 0.15s; text-decoration: none;
}
.forgot-link:hover { color: var(--accent); }

/* ── MESSAGES ────────────────────────────────────────────────── */
.msg {
  font-size: 13px; border-radius: 8px; padding: 10px 13px;
  margin-bottom: 14px; display: none; line-height: 1.5;
}
.msg.visible { display: block; }
#error-msg   { background: rgba(224,40,74,0.1);  color: var(--danger);  border: 1px solid rgba(224,40,74,0.25); }
#success-msg { background: rgba(0,160,122,0.1);  color: var(--success); border: 1px solid rgba(0,160,122,0.25); }

/* ── SUBMIT BUTTON ───────────────────────────────────────────── */
.submit-btn {
  width: 100%; padding: 13px; border-radius: 12px; border: none;
  background: var(--accent); color: var(--bg);
  font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700;
  cursor: pointer; margin-bottom: 14px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
}
.submit-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(120,184,0,0.3); }
.submit-btn:active:not(:disabled) { transform: none; }
.submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

.spinner {
  display: none; width: 16px; height: 16px;
  border: 2px solid rgba(0,0,0,0.25); border-top-color: var(--bg);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── DIVIDER ─────────────────────────────────────────────────── */
.divider {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px; color: var(--muted); font-size: 12px;
}
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── GOOGLE BUTTON ───────────────────────────────────────────── */
.google-btn {
  width: 100%; padding: 12px; border-radius: 12px;
  border: 1px solid var(--border); background: var(--surface2); color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: border-color 0.15s, background 0.15s;
}
.google-btn:hover { border-color: var(--text); background: var(--bg); }
.google-btn:disabled { opacity: 0.6; cursor: not-allowed; }

/* ── FOOTER LINK ─────────────────────────────────────────────── */
.footer-note {
  text-align: center; font-size: 12px; color: var(--muted); margin-top: 18px;
}
.footer-note a { color: var(--accent); cursor: pointer; text-decoration: none; font-weight: 600; }
.footer-note a:hover { text-decoration: underline; }

/* ── RESPONSIVE ──────────────────────────────────────────────── */
@media (max-width: 440px) {
  .login-card { padding: 28px 18px 24px; border-radius: 16px; }
}
</style>
</head>
<body>

<button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">
  <span class="theme-icon moon">🌙</span>
  <span class="theme-icon sun">☀️</span>
</button>

<div class="login-card">
  <div class="logo-wrap">
    <div class="logo">Expense<span>Manager</span></div>
    <div class="logo-sub">Personal Finance Tracker</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-login"  onclick="switchMode('login')">Sign In</button>
    <button class="tab"        id="tab-signup" onclick="switchMode('signup')">Sign Up</button>
  </div>

  <div class="form-title" id="form-title">Welcome back</div>

  <!-- Messages -->
  <div class="msg" id="error-msg"></div>
  <div class="msg" id="success-msg"></div>

  <!-- Form -->
  <form onsubmit="handleSubmit(event)" novalidate>
    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <input type="email" id="inp-email" placeholder="you@example.com" autocomplete="email">
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="inp-password" placeholder="Enter your password" autocomplete="current-password">
        <button type="button" class="eye-btn" onclick="togglePwd('inp-password', this)">👁</button>
      </div>
    </div>

    <!-- Confirm password — sign up only -->
    <div class="form-group" id="confirm-group" style="display:none">
      <label>Confirm Password</label>
      <div class="input-wrap">
        <input type="password" id="inp-confirm" placeholder="Re-enter your password" autocomplete="new-password">
        <button type="button" class="eye-btn" onclick="togglePwd('inp-confirm', this)">👁</button>
      </div>
    </div>

    <a class="forgot-link" id="forgot-link" onclick="handleForgot()">Forgot password?</a>

    <button type="submit" class="submit-btn" id="submit-btn">
      <span id="btn-text">Sign In</span>
      <span class="spinner" id="btn-spin"></span>
    </button>
  </form>

  <div class="divider">or continue with</div>

  <!-- Google Sign-In -->
  <button class="google-btn" id="google-btn" onclick="handleGoogle()">
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Continue with Google
  </button>

  <div class="footer-note" id="footer-note">
    Don't have an account? <a onclick="switchMode('signup')">Sign Up</a>
  </div>
</div>

<script>
// ══ FIREBASE CONFIG ═══════════════════════════════════════════════
// IMPORTANT: authDomain must be plain text — no markdown, no brackets
const firebaseConfig = {
  apiKey:            "AIzaSyCPlB-HjpQPfBQbkvH8gApsyBY-ju5l2G4",
  authDomain:        "expense-manager-d42e0.firebaseapp.com",
  projectId:         "expense-manager-d42e0",
  storageBucket:     "expense-manager-d42e0.appspot.com",
  messagingSenderId: "777494191910",
  appId:             "1:777494191910:web:4860b0e50889ec703901b0"
};

firebase.initializeApp(firebaseConfig);
const auth     = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

// ══ SKIP LOGIN IF ALREADY SIGNED IN ═══════════════════════════════
auth.onAuthStateChanged(user => {
  if (user) window.location.replace('index.html');
});

// ══ THEME ══════════════════════════════════════════════════════════
(function() {
  const saved = localStorage.getItem('spendex_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();

function toggleTheme() {
  const cur  = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('spendex_theme', next);
}

// ══ MODE SWITCH (Login ↔ Sign Up) ══════════════════════════════════
let mode = 'login';

function switchMode(newMode) {
  mode = newMode;
  const isSignup = mode === 'signup';
  document.getElementById('tab-login').classList.toggle('active', !isSignup);
  document.getElementById('tab-signup').classList.toggle('active', isSignup);
  document.getElementById('form-title').textContent        = isSignup ? 'Create account'  : 'Welcome back';
  document.getElementById('btn-text').textContent          = isSignup ? 'Create Account'   : 'Sign In';
  document.getElementById('forgot-link').style.display     = isSignup ? 'none'             : 'block';
  document.getElementById('confirm-group').style.display   = isSignup ? 'block'            : 'none';
  document.getElementById('footer-note').innerHTML         = isSignup
    ? 'Already have an account? <a onclick="switchMode(\'login\')">Sign In</a>'
    : 'Don\'t have an account? <a onclick="switchMode(\'signup\')">Sign Up</a>';
  hideMessages();
}

// ══ HELPERS ════════════════════════════════════════════════════════
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.classList.add('visible');
  document.getElementById('success-msg').classList.remove('visible');
}
function showSuccess(msg) {
  const el = document.getElementById('success-msg');
  el.textContent = msg; el.classList.add('visible');
  document.getElementById('error-msg').classList.remove('visible');
}
function hideMessages() {
  document.getElementById('error-msg').classList.remove('visible');
  document.getElementById('success-msg').classList.remove('visible');
}
function setLoading(on) {
  document.getElementById('submit-btn').disabled  = on;
  document.getElementById('google-btn').disabled  = on;
  document.getElementById('btn-text').style.display = on ? 'none'   : 'inline';
  document.getElementById('btn-spin').style.display = on ? 'inline' : 'none';
}
function friendlyError(code) {
  const map = {
    'auth/invalid-email':          'Please enter a valid email address.',
    'auth/user-not-found':         'No account found with that email.',
    'auth/wrong-password':         'Incorrect password. Try again.',
    'auth/invalid-credential':     'Incorrect email or password. Try again.',
    'auth/email-already-in-use':   'An account with this email already exists.',
    'auth/weak-password':          'Password must be at least 6 characters.',
    'auth/too-many-requests':      'Too many attempts. Please wait a moment.',
    'auth/network-request-failed': 'Network error. Check your connection.',
    'auth/popup-closed-by-user':   'Sign-in was cancelled.',
    'auth/popup-blocked':          'Popup was blocked by your browser. Please allow popups for this site.',
    'auth/unauthorized-domain':    'This domain is not authorised in Firebase. Add it in Firebase Console → Authentication → Authorized Domains.',
  };
  return map[code] || 'Something went wrong (' + code + '). Please try again.';
}
function togglePwd(id, btn) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type   = show ? 'text' : 'password';
  btn.textContent = show ? '🙈' : '👁';
}

// ══ EMAIL / PASSWORD SUBMIT ════════════════════════════════════════
function handleSubmit(e) {
  e.preventDefault();
  const email    = document.getElementById('inp-email').value.trim();
  const password = document.getElementById('inp-password').value;
  const confirm  = document.getElementById('inp-confirm').value;

  if (!email || !password)                      { showError('Please fill in all fields.');      return; }
  if (mode === 'signup' && password !== confirm) { showError('Passwords do not match.');         return; }
  if (mode === 'signup' && password.length < 6)  { showError('Password must be at least 6 characters.'); return; }

  setLoading(true);

  const action = mode === 'login'
    ? auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
        .then(() => auth.signInWithEmailAndPassword(email, password))
    : auth.createUserWithEmailAndPassword(email, password);

  action
    .then(() => window.location.replace('index.html'))
    .catch(err => { setLoading(false); showError(friendlyError(err.code)); });
}

// ══ FORGOT PASSWORD ════════════════════════════════════════════════
function handleForgot() {
  const email = document.getElementById('inp-email').value.trim();
  if (!email) { showError('Enter your email address first, then click Forgot Password.'); return; }
  auth.sendPasswordResetEmail(email)
    .then(() => showSuccess('Password reset email sent! Check your inbox.'))
    .catch(err => showError(friendlyError(err.code)));
}

// ══ GOOGLE SIGN-IN ══════════════════════════════════════════════════
// Uses signInWithPopup — requires your GitHub Pages domain to be added
// in Firebase Console → Authentication → Settings → Authorized Domains
function handleGoogle() {
  setLoading(true);
  auth.signInWithPopup(provider)
    .then(() => window.location.replace('index.html'))
    .catch(err => {
      setLoading(false);
      // Special handling for unauthorized domain — most common cause of black popup
      if (err.code === 'auth/unauthorized-domain') {
        showError(
          'Domain not authorised. Go to Firebase Console → Authentication → ' +
          'Settings → Authorized Domains → Add Domain → add your GitHub Pages URL.'
        );
      } else {
        showError(friendlyError(err.code));
      }
    });
}
</script>
</body>
</html>
