<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
    <style>
        /* [Your CSS is perfect, no changes needed here] */
        [data-theme="dark"] { --bg:#0c0c0f; --surface:#141418; --surface2:#1c1c22; --border:#2a2a35; --text:#e8e8f0; --muted:#6a6a80; --accent:#c8f55a; --danger:#f55a8c; --grid-ln:rgba(200,245,90,0.03); --shadow:rgba(0,0,0,0.4); --chart-border:#141418; }
        [data-theme="light"] { --bg:#f4f4f0; --surface:#ffffff; --surface2:#f0f0ec; --border:#dcdcd4; --text:#18181c; --muted:#888890; --accent:#7ab800; --danger:#e0284a; --grid-ln:rgba(0,0,0,0.04); --shadow:rgba(0,0,0,0.08); --chart-border:#ffffff; }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: background 0.3s, color 0.3s; display: none; }
        body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--grid-ln) 1px, transparent 1px), linear-gradient(90deg, var(--grid-ln) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
        .app { position: relative; z-index: 1; max-width: 1140px; margin: 0 auto; padding: 0 24px 80px; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 28px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 30px; gap: 12px; flex-wrap: wrap; }
        .logo { font-family:'Syne',sans-serif; font-size:26px; font-weight:800; letter-spacing:-1px; color:var(--text); }
        .logo span { color:var(--accent); }
        .header-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
        .theme-btn { width:44px; height:26px; border-radius:13px; border:1px solid var(--border); background:var(--surface2); cursor:pointer; position:relative; transition: background 0.25s, border-color 0.25s; flex-shrink:0; }
        .theme-btn::after { content:''; position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:var(--muted); transition: left 0.25s, background 0.25s; }
        [data-theme="light"] .theme-btn::after { left:21px; background:var(--accent); }
        .theme-icon { font-size:13px; position:absolute; top:50%; transform:translateY(-50%); }
        .theme-icon.moon { left:6px; }
        .theme-icon.sun  { right:5px; }
        nav { display:flex; gap:6px; }
        .nav-btn { font-family:'DM Mono',monospace; font-size:12px; padding:9px 18px; border-radius:40px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; transition:all 0.2s; letter-spacing:0.4px; white-space:nowrap; }
        .nav-btn:hover { border-color:var(--accent); color:var(--accent); }
        .nav-btn.active { background:var(--accent); color:var(--bg); border-color:var(--accent); font-weight:600; }
        .view { display:none; }
        .view.active { display:block; animation:fadeIn 0.3s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; box-shadow:0 2px 16px var(--shadow); transition: background 0.3s, border-color 0.3s; }
        .card-title { font-family:'Syne',sans-serif; font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:18px; }
        .add-layout { display:grid; grid-template-columns:1fr 1fr; gap:20px; align-items:start; }
        .form-group { margin-bottom:16px; }
        label { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:7px; }
        input { background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:'DM Mono',monospace; font-size:14px; padding:11px 13px; outline:none; transition:border-color 0.2s, background 0.3s; appearance:none; -moz-appearance:textfield; }
        input:focus { border-color:var(--accent); }
        .amount-wrap { position:relative; }
        .currency-sym { position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:17px; color:var(--accent); font-weight:600; }
        .amount-wrap input { padding-left:30px; width:100%; font-size:20px; font-weight:600; }
        .date-fields { display:flex; align-items:center; gap:6px; }
        .date-fields input { text-align:center; }
        .date-dd  { width:58px; }
        .date-mm  { width:58px; }
        .date-yyyy{ width:82px; }
        .date-sep { color:var(--muted); font-size:18px; }
        .cat-grid { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:10px; }
        .cat-pill { padding:7px 10px 7px 11px; border-radius:10px; border:1px solid var(--border); background:var(--surface2); color:var(--muted); font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.3px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:border-color 0.15s, color 0.15s, background 0.15s; white-space:nowrap; }
        .cat-pill:hover { border-color:var(--text); color:var(--text); }
        .cat-pill.selected { border-color:transparent; color:#0c0c0f; font-weight:600; }
        [data-theme="light"] .cat-pill.selected { color:#fff; }
        .pill-x { display:inline-flex; align-items:center; justify-content:center; width:14px; height:14px; border-radius:50%; background:rgba(128,128,128,0.18); color:currentColor; border:none; cursor:pointer; font-size:10px; flex-shrink:0; transition:background 0.15s, color 0.15s; padding:0; }
        .pill-x:hover { background:var(--danger) !important; color:#fff !important; }
        .add-tag-row { display:flex; gap:8px; }
        .add-tag-row input { flex:1; font-size:13px; padding:10px 12px; }
        .add-tag-btn { padding:0 15px; border-radius:10px; border:1px solid var(--accent); background:transparent; color:var(--accent); font-family:'DM Mono',monospace; font-size:12px; cursor:pointer; white-space:nowrap; transition:all 0.15s; }
        .add-tag-btn:hover { background:var(--accent); color:var(--bg); }
        .inp-full { width:100%; }
        .submit-btn { width:100%; padding:13px; border-radius:12px; border:none; background:var(--accent); color:var(--bg); font-family:'Syne',sans-serif; font-size:14px; font-weight:700; cursor:pointer; margin-top:6px; transition:transform 0.15s, box-shadow 0.15s; }
        .submit-btn:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(120,180,0,0.25); }
        .recent-list { display:flex; flex-direction:column; gap:9px; max-height:490px; overflow-y:auto; }
        .expense-item { display:flex; align-items:center; gap:11px; padding:11px 13px; background:var(--surface2); border-radius:10px; border:1px solid var(--border); transition: background 0.3s; }
        .exp-dot  { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
        .exp-info { flex:1; min-width:0; }
        .exp-cat  { font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }
        .exp-note { font-size:12px; color:var(--text); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .exp-date { font-size:10px; color:var(--muted); margin-top:3px; font-weight:500; }
        .exp-amount { font-size:15px; font-weight:600; color:var(--accent); white-space:nowrap; }
        .exp-del { background:none; border:none; color:var(--muted); cursor:pointer; font-size:18px; padding:2px 4px; transition:color 0.15s; }
        .exp-del:hover { color:var(--danger); }
        .empty-state { text-align:center; padding:36px; color:var(--muted); font-size:12px; line-height:2; }
        .empty-icon  { font-size:34px; margin-bottom:10px; }
        .toast { position:fixed; bottom:24px; right:24px; background:var(--accent); color:var(--bg); font-family:'Syne',sans-serif; font-weight:700; font-size:13px; padding:11px 18px; border-radius:10px; transform:translateY(80px); opacity:0; transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index:100; }
        .toast.show { transform:translateY(0); opacity:1; }
    </style>
</head>
<body>
<div class="app">
    <header>
        <div class="logo">Expense<span>Manager</span></div>
        <div class="header-right">
            <button class="theme-btn" onclick="toggleTheme()"><span class="theme-icon moon">🌙</span><span class="theme-icon sun">☀️</span></button>
            <nav>
                <button class="nav-btn active" onclick="switchView('add',this)">＋ Add</button>
                <button class="nav-btn" onclick="switchView('analytics',this)">📊 Analytics</button>
                <button class="nav-btn" onclick="logout()" style="color: var(--danger); border-color: var(--danger);">Logout</button>
            </nav>
        </div>
    </header>

    <div class="view active" id="view-add">
        <div class="add-layout">
            <div class="card">
                <div class="card-title">New Expense</div>
                <div class="form-group">
                    <label>Amount (₹)</label>
                    <div class="amount-wrap"><span class="currency-sym">₹</span><input type="number" id="inp-amount" placeholder="0.00"></div>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <div class="date-fields">
                        <input type="number" class="date-dd" id="inp-dd" placeholder="DD">
                        <input type="number" class="date-mm" id="inp-mm" placeholder="MM">
                        <input type="number" class="date-yyyy" id="inp-yyyy" placeholder="YYYY">
                    </div>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <div class="cat-grid" id="cat-grid"></div>
                </div>
                <div class="form-group"><label>Note</label><input type="text" id="inp-note" class="inp-full"></div>
                <button class="submit-btn" onclick="addExpense()">Add Expense</button>
            </div>
            <div class="card">
                <div class="card-title">Recent Expenses</div>
                <div class="recent-list" id="recent-list"></div>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ STATE ════════════════════════════════════════════════════════
const S_CATS = 'spendex_cats_v3', S_THEME = 'spendex_theme';
const DEFAULTS = [
    {name:'Food', icon:'🍛', color:'#f55a8c'}, {name:'Stationery', icon:'📚', color:'#5af5c8'},
    {name:'Electronics', icon:'⚡', color:'#5a8cf5'}, {name:'Travel', icon:'✈️', color:'#c85af5'}
];
let expenses = [], cats = JSON.parse(localStorage.getItem(S_CATS)) || DEFAULTS;
let selectedCat = '', currentView = 'add';

// ══ FIREBASE ═════════════════════════════════════════════════════
const firebaseConfig = {
    apiKey: "AIzaSyCPlB-HjpQPfBQbkvH8gApsyBY-ju5l2G4",
    authDomain: "expense-manager-d42e0.firebaseapp.com",
    projectId: "expense-manager-d42e0",
    storageBucket: "expense-manager-d42e0.appspot.com",
    messagingSenderId: "777494191910",
    appId: "1:777494191910:web:4860b0e50889ec703901b0"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(), db = firebase.firestore();

auth.onAuthStateChanged(user => {
    if (!user) window.location.replace("login.html");
    else {
        document.body.style.display = "block";
        renderCatGrid();
        listenForExpenses(user.uid);
    }
});

function listenForExpenses(uid) {
    db.collection("users").doc(uid).collection("expenses").orderBy("timestamp", "desc")
      .onSnapshot(snap => {
          expenses = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          renderRecent();
      });
}

function addExpense() {
    const amount = parseFloat(document.getElementById('inp-amount').value);
    const date = `${document.getElementById('inp-yyyy').value}-${document.getElementById('inp-mm').value.padStart(2,'0')}-${document.getElementById('inp-dd').value.padStart(2,'0')}`;
    const user = auth.currentUser;
    if (!amount || !selectedCat) return showToast("Fill all fields");
    
    db.collection("users").doc(user.uid).collection("expenses").add({
        amount, date, cat: selectedCat, note: document.getElementById('inp-note').value,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
        showToast("Synced!");
        document.getElementById('inp-amount').value = '';
    });
}

function delExpense(id) {
    db.collection("users").doc(auth.currentUser.uid).collection("expenses").doc(id).delete();
}

function logout() { auth.signOut(); }

// ══ UI HELPERS ═══════════════════════════════════════════════════
function renderCatGrid() {
    document.getElementById('cat-grid').innerHTML = cats.map(c => `
        <button class="cat-pill ${selectedCat===c.name?'selected':''}" onclick="selectedCat='${c.name}';renderCatGrid()" style="${selectedCat===c.name?`background:${c.color}`:''}">
            ${c.icon} ${c.name}
        </button>`).join('');
}

function renderRecent() {
    const list = document.getElementById('recent-list');
    list.innerHTML = expenses.map(e => `
        <div class="expense-item">
            <div class="exp-info"><div class="exp-cat">${e.cat}</div><div class="exp-date">${e.date}</div></div>
            <div class="exp-amount">₹${e.amount}</div>
            <button class="exp-del" onclick="delExpense('${e.id}')">×</button>
        </div>`).join('');
}

function switchView(v, btn) {
    currentView = v;
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.getElementById('view-'+v).classList.add('active');
}

function showToast(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

(function init() {
    const d = new Date();
    document.getElementById('inp-dd').value = d.getDate();
    document.getElementById('inp-mm').value = d.getMonth()+1;
    document.getElementById('inp-yyyy').value = d.getFullYear();
})();
</script>
</body>
</html>
